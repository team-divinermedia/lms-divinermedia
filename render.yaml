services:
  - type: web
    name: lms-divinermedia
    runtime: node
    plan: free
    nodeVersion: 22.11.0
    buildCommand: npm install && npm run build && npx prisma generate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://lms.divinermedia.com
      - key: CLIENT_URL
        value: https://lms.divinermedia.com
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: GOOGLE_DRIVE_CLIENT_ID
        sync: false
      - key: GOOGLE_DRIVE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_DRIVE_REFRESH_TOKEN
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: UPLOAD_DIR
        value: ./uploads
